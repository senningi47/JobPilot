server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: jobpilot-backend

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:jobpilot}?useSSL=false&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyForDevelopmentOnly}
    expiration: ${JWT_EXPIRATION:86400}
  ai-service:
    url: http://localhost:${APP_PORT_AI_SERVICE:8000}
  oss:
    endpoint: ${OSS_ENDPOINT:localhost:9000}
    access-key: ${OSS_ACCESS_KEY:minioadmin}
    secret-key: ${OSS_SECRET_KEY:minioadmin}
    bucket: ${OSS_BUCKET:jobpilot}
